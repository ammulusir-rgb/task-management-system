<header class="app-header">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-link text-secondary p-0" (click)="toggleSidebar.emit()">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="search-box d-none d-md-block">
      <div class="input-group input-group-sm">
        <span class="input-group-text bg-transparent border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input
          type="text"
          class="form-control border-start-0 bg-transparent"
          [placeholder]="i18n.t('shell.searchPlaceholder')"
        />
      </div>
    </div>
  </div>

  <div class="d-flex align-items-center gap-3">
    <!-- Notifications bell -->
    <a routerLink="/notifications" class="btn btn-link text-secondary p-0 position-relative">
      <i class="bi bi-bell fs-5"></i>
      @if (unreadCount() > 0) {
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          {{ unreadCount() > 99 ? '99+' : unreadCount() }}
        </span>
      }
    </a>

    <!-- Language switcher -->
    <div class="dropdown">
      <button
        class="btn btn-link p-0 text-secondary"
        data-bs-toggle="dropdown"
        aria-label="Switch language"
      >
        <span class="fs-5">{{ languageLabels[i18n.locale()].flag }}</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end lang-dropdown">
        @for (loc of supportedLocales; track loc.code) {
          <li>
            <button
              class="dropdown-item d-flex align-items-center gap-2"
              [class.active]="loc.code === i18n.locale()"
              (click)="switchLanguage(loc.code)"
            >
              <span>{{ languageLabels[loc.code].flag }}</span>
              <span>{{ languageLabels[loc.code].name }}</span>
            </button>
          </li>
        }
      </ul>
    </div>

    <!-- User menu -->
    <div class="dropdown">
      <button
        class="btn btn-link p-0 d-flex align-items-center gap-2 text-decoration-none"
        data-bs-toggle="dropdown"
      >
        <app-user-avatar
          [name]="currentUser()?.full_name ?? ''"
          [avatarUrl]="currentUser()?.avatar ?? null"
          size="sm"
        />
        <span class="d-none d-lg-inline text-secondary small">
          {{ currentUser()?.first_name }}
        </span>
        <i class="bi bi-chevron-down text-muted small"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" routerLink="/profile"><i class="bi bi-person me-2"></i>{{ i18n.t('header.profile') }}</a></li>
        <li><a class="dropdown-item" routerLink="/admin"><i class="bi bi-gear me-2"></i>{{ i18n.t('header.settings') }}</a></li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <button class="dropdown-item text-danger" (click)="authService.logout()">
            <i class="bi bi-box-arrow-right me-2"></i>{{ i18n.t('header.signOut') }}
          </button>
        </li>
      </ul>
    </div>
  </div>
</header>
