<div class="auth-page">
  <div class="auth-card card-custom">
    <div class="text-center mb-4">
      <i class="bi bi-lock fs-1 text-primary"></i>
      <h3 class="mt-2">{{ 'auth.forgotPasswordTitle' | translate }}</h3>
      <p class="text-muted">{{ 'auth.forgotPasswordSubtitle' | translate }}</p>
    </div>

    @if (sent()) {
      <div class="alert alert-success">
        {{ 'auth.resetSent' | translate }}
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">{{ 'auth.email' | translate }}</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            [placeholder]="'auth.emailPlaceholder' | translate"
            [ngClass]="{ 'is-invalid': submitted() && form.get('email')?.invalid }"
          />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          {{ 'auth.sendResetLink' | translate }}
        </button>
      </form>
    }

    <p class="text-center mt-4 mb-0 small text-muted">
      <a routerLink="/auth/login">{{ 'auth.backToSignIn' | translate }}</a>
    </p>
  </div>
</div>
