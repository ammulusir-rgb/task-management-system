<div class="d-flex justify-content-center align-items-center" [style.min-height]="minHeight()">
  <div class="spinner-border text-primary" [class]="size() === 'sm' ? 'spinner-border-sm' : ''" role="status">
    <span class="visually-hidden">{{ 'common.loading' | translate }}</span>
  </div>
  @if (message()) {
    <span class="ms-2 text-muted">{{ message() }}</span>
  }
</div>
