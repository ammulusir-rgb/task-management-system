<div class="modal-header">
  <h5 class="modal-title">{{ title() }}</h5>
</div>
<div class="modal-body">
  <p>{{ message() }}</p>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="cancelled.emit()">
    {{ cancelText() }}
  </button>
  <button
    type="button"
    class="btn"
    [class]="confirmClass()"
    (click)="confirmed.emit()"
  >
    {{ confirmText() }}
  </button>
</div>
